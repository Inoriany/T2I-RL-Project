# @package _global_
# ============================================================================
# Ablation: 5 epochs  (vs. baseline 10 epochs)
# ============================================================================
# Purpose : Test whether additional epochs improve performance or overfit
# Usage   : python scripts/train.py --config-name experiment/ablation_5ep
# Member  : B (Ablation experiments)
# Note    : ~half the training time (~5-7 hours); ~half API cost (~¥8-10)
# ============================================================================

defaults:
  - /model: janus_pro
  - /training: grpo
  - /reward: composite_siliconflow
  - _self_

experiment:
  name: "grpo_full_5ep"
  description: "Ablation: 5 epochs (vs. baseline 10 epochs)"
  tags: ["grpo", "ablation", "5ep", "composite"]

model:
  model_path: "deepseek-ai/Janus-Pro-1B"
  dtype: "bfloat16"
  use_flash_attention: true

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

training:
  learning_rate: 1e-5
  num_epochs: 5            # <-- ABLATION: 5 epochs instead of 10
  batch_size: 2
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  weight_decay: 0.01

  grpo:
    group_size: 4
    kl_coef: 0.01
    normalize_rewards: true
    use_advantage_normalization: true
    baseline_type: "mean"

  warmup_steps: 50         # proportionally halved
  lr_scheduler: "cosine"

  save_steps: 300
  eval_steps: 150
  logging_steps: 10
  output_dir: "./outputs/grpo_full_5ep"
  save_total_limit: 3

data:
  train_file: "data/prompts/train_prompts_large.json"
  eval_file:  "data/prompts/val_prompts.json"
  max_train_samples: null
  max_eval_samples: 25

evaluation:
  benchmarks:
    - "t2i_compbench"
    - "tifa"
    - "geneval"
  compute_clip_score: true
  compute_vlm_score: true
  save_images: true
  num_samples_per_prompt: 3

logging:
  use_wandb: true
  wandb_project: "t2i-rl"
  wandb_run_name: "ablation-5ep-${now:%Y%m%d-%H%M%S}"
  logging_steps: 10

hardware:
  bf16: true
  dataloader_num_workers: 4
  seed: 42
