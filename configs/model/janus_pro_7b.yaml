# Janus-Pro-7B Model Configuration
# Larger version for better quality (requires more VRAM)

name: "janus-pro-7b"
model_path: "deepseek-ai/Janus-Pro-7B"
dtype: "bfloat16"
use_flash_attention: true

# Generation parameters
generation:
  image_size: 384
  num_image_tokens: 576
  cfg_weight: 5.0
  temperature: 1.0
  top_p: null

# LoRA configuration (smaller rank for memory efficiency)
lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
