# @package _global_

# Default configuration for T2I-RL training

# Model configuration
model:
  name: "janus-pro"
  model_path: "deepseek-ai/Janus-Pro-1B"
  dtype: "bfloat16"
  use_flash_attention: true
  
  # LoRA configuration
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"

# Reward model configuration
reward:
  type: "composite"  # clip, vlm, composite
  
  clip:
    model_name: "ViT-L-14"
    pretrained: "openai"
    weight: 0.3
    
  vlm:
    use_api: true
    api_model: "gpt-4-vision-preview"
    weight: 0.7
    evaluation_prompt: null  # Use default

# Training configuration
training:
  algorithm: "grpo"  # grpo, reward_weighted
  
  # Basic params
  learning_rate: 1e-5
  num_epochs: 10
  batch_size: 4
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  
  # GRPO-specific
  grpo:
    num_samples_per_prompt: 4
    temperature: 1.0
    clip_ratio: 0.2
    use_advantage_normalization: true
    baseline_type: "mean"
    kl_coef: 0.1
    
  # Optimization
  warmup_steps: 100
  weight_decay: 0.01
  
  # Checkpointing
  save_steps: 500
  eval_steps: 100
  output_dir: "./outputs"
  save_total_limit: 3

# Data configuration
data:
  train_file: null
  eval_file: null
  max_train_samples: null
  max_eval_samples: 100
  
# Evaluation configuration
evaluation:
  benchmarks:
    - "t2i_compbench"
    - "tifa"
    - "geneval"
  compute_clip_score: true
  compute_vlm_score: true
  save_images: true
  
# Logging configuration
logging:
  use_wandb: true
  wandb_project: "t2i-rl"
  wandb_run_name: null
  logging_steps: 10

# Hardware configuration
hardware:
  fp16: false
  bf16: true
  dataloader_num_workers: 4
  seed: 42
