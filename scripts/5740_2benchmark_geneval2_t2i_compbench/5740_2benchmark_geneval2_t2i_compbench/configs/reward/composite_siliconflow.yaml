# Composite reward: CLIP + VLM via 硅基流动 (SiliconFlow) OpenAI-compatible API
# 默认端点: https://api.siliconflow.com/v1
# 如需切换可设置: SILICONFLOW_BASE_URL 或 SILICON_BASE_URL
#
# 使用前在环境中设置其一:
#   export SILICONFLOW_API_KEY="..."
#   或 export SILICON_API_KEY="..."
# 申请: https://cloud.siliconflow.cn/
#
# 训练示例:
#   python scripts/train.py reward=composite_siliconflow data.train_file=data/prompts/train_prompts.json

type: "composite"

clip:
  model_name: "ViT-L-14"
  pretrained: "openai"
  weight: 0.3
  gate_threshold: 0.2

vlm:
  provider: "local"
  use_api: false
  api_model: null
  model_name: null
  model_name_or_path: "Qwen/Qwen2.5-VL-3B-Instruct"
  weight: 0.7

  aspects:
    object_presence: 0.30
    attribute_accuracy: 0.30
    spatial_relations: 0.25
    overall_quality: 0.15

  evaluation_prompt: |
    请根据以下描述评估这张图像:
    "{prompt}"

    从 0-10 分评估以下方面:
    1. 物体存在: 所有提到的物体是否都存在？有无多余物体？(0-3分)
    2. 属性准确: 颜色、大小、形状、纹理是否正确？(0-3分)
    3. 空间关系: 物体之间的位置关系是否正确？(0-2分)
    4. 整体质量: 图像质量、连贯性、自然度如何？(0-2分)

    只返回 JSON 格式:
    {{"object_score": X, "attribute_score": X, "spatial_score": X, "quality_score": X, "total_score": X}}

aggregation: "weighted_sum"

cache:
  enabled: true
  cache_dir: "./cache/composite_siliconflow_rewards"
